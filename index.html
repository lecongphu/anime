<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080d13">
    <meta name="description" content="Tân Liên Hoa Anime - tìm và xem anime nhanh trên web.">
    <title>Tân Liên Hoa Anime</title>
    <link rel="apple-touch-icon" href="/anime/image/r3_512.png">
    <link rel="icon" type="image/png" href="/anime/image/r3_512.png">
    <link rel="canonical" href="https://tanlienhoa.com/anime/">
    <meta property="og:image" content="https://tanlienhoa.com/anime/image/r3.png">
    <meta property="og:title" content="Tân Liên Hoa Anime">
    <meta property="og:description" content="Tìm, lọc và xem anime nhanh.">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://phimapi.com">
    <link rel="preconnect" href="https://phimimg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080d13;
            --bg-soft: #0d1520;
            --panel: rgba(15, 24, 36, 0.86);
            --panel-strong: rgba(20, 31, 45, 0.94);
            --line: rgba(179, 199, 224, 0.16);
            --line-strong: rgba(179, 199, 224, 0.28);
            --text: #f4f8ff;
            --muted: #9db0c8;
            --muted-strong: #c8d6e8;
            --accent: #44d7b6;
            --accent-2: #69b7ff;
            --danger: #ff7b91;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
            --radius: 24px;
            --card-w: 218px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 18% -8%, rgba(68, 215, 182, 0.22), transparent 28rem),
                radial-gradient(circle at 92% 2%, rgba(105, 183, 255, 0.24), transparent 30rem),
                linear-gradient(180deg, #0b111a 0%, #080d13 42%, #0b1118 100%);
            overflow-x: hidden;
        }

        body.overlay-open {
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent 88%);
        }

        a {
            color: inherit;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .page-shell {
            width: min(1480px, 100%);
            margin: 0 auto;
            padding: 24px clamp(14px, 3vw, 36px) 48px;
        }

        .hero {
            position: sticky;
            top: 0;
            z-index: 20;
            display: grid;
            gap: 18px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(15, 24, 36, 0.94), rgba(9, 15, 23, 0.82));
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero-top,
        .toolbar,
        .filter-row,
        .user-menu,
        .stats-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-top {
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            min-width: 0;
            gap: 14px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 16px 34px rgba(68, 215, 182, 0.18);
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 2.35rem);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .user-menu {
            position: relative;
            justify-content: flex-end;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border: 1px solid var(--line-strong);
            border-radius: 50%;
            background: var(--panel-strong);
            padding: 0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .avatar-dropdown {
            position: absolute;
            top: 54px;
            right: 0;
            min-width: 184px;
            display: none;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel-strong);
            box-shadow: var(--shadow);
        }

        .avatar-dropdown.show {
            display: grid;
            gap: 6px;
        }

        .avatar-dropdown button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text);
            background: transparent;
            text-align: left;
        }

        .avatar-dropdown button:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .toolbar {
            flex-wrap: wrap;
        }

        .search-form {
            display: flex;
            flex: 1 1 360px;
            gap: 10px;
        }

        .search-form input,
        .filter-row select {
            min-height: 46px;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            color: var(--text);
            background: rgba(4, 9, 15, 0.72);
            outline: none;
        }

        .search-form input {
            width: 100%;
            padding: 0 18px;
        }

        .filter-row select {
            min-width: 154px;
            padding: 0 14px;
            color-scheme: dark;
        }

        .search-form input:focus,
        .filter-row select:focus {
            border-color: rgba(105, 183, 255, 0.78);
            box-shadow: 0 0 0 4px rgba(105, 183, 255, 0.16);
        }

        .primary-button,
        .ghost-button {
            min-height: 46px;
            padding: 0 18px;
            border-radius: 999px;
            color: #061016;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            font-weight: 800;
            box-shadow: 0 14px 28px rgba(68, 215, 182, 0.18);
        }

        .ghost-button {
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
            border: 1px solid var(--line);
        }

        .filter-row {
            flex-wrap: wrap;
        }

        .stats-row {
            justify-content: space-between;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .source-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted-strong);
            background: rgba(255, 255, 255, 0.06);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .main-area {
            padding-top: 22px;
        }

        .image-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, var(--card-w)), 1fr));
            gap: clamp(14px, 2vw, 22px);
            align-items: start;
        }

        .anime-card {
            position: relative;
            min-width: 0;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel);
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.28);
            transform: translateZ(0);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .anime-card:hover {
            transform: translateY(-4px);
            border-color: rgba(105, 183, 255, 0.42);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
        }

        .poster-link {
            display: block;
            color: inherit;
            text-decoration: none;
        }

        .poster-link.no-card-link {
            cursor: default;
        }

        .poster-frame {
            position: relative;
            aspect-ratio: 300 / 424;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(68, 215, 182, 0.12), rgba(105, 183, 255, 0.12));
        }

        .img-thumbnail {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            object-fit: cover;
            transform: scale(1.01);
            transition: transform 0.24s ease, filter 0.24s ease;
        }

        .anime-card:hover .img-thumbnail {
            transform: scale(1.055);
            filter: saturate(1.08);
        }

        .anime-name-label {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3;
            min-height: 76px;
            display: flex;
            align-items: flex-end;
            padding: 36px 14px 12px;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.86));
            color: var(--text);
            font-weight: 800;
            line-height: 1.18;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.76);
        }

        .anime-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px 12px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
        }

        .anime-ep-box {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 4;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            pointer-events: none;
        }

        .anime-ep {
            min-width: 34px;
            height: 34px;
            padding: 0 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            color: var(--text);
            background: rgba(6, 12, 19, 0.72);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            text-decoration: none;
            pointer-events: auto;
        }

        .anime-ep:hover {
            background: rgba(68, 215, 182, 0.22);
            border-color: rgba(68, 215, 182, 0.44);
        }

        .anime-ep.external-source {
            background: rgba(255, 183, 77, 0.2);
            border-color: rgba(255, 183, 77, 0.42);
        }

        .anime-ep.disabled {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .anime-ep-text {
            color: inherit;
            font-size: 0.78rem;
            font-weight: 800;
        }

        .anime-ep-text.watched {
            color: #70c4ff;
        }

        .status-panel {
            margin: 64px auto 0;
            width: min(520px, 100%);
            display: grid;
            place-items: center;
            gap: 14px;
            padding: 30px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--muted);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255, 255, 255, 0.14);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.84s linear infinite;
        }

        .empty-title {
            margin: 0;
            color: var(--text);
            font-size: 1.08rem;
            font-weight: 800;
        }

        .error-text {
            color: var(--danger);
        }

        .pagination-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 26px auto 0;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--panel);
            width: fit-content;
            max-width: 100%;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
        }

        .pagination-row[hidden] {
            display: none !important;
        }

        .page-button {
            min-height: 40px;
            padding: 0 16px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
            font-weight: 800;
        }

        .page-button:disabled {
            cursor: not-allowed;
            opacity: 0.46;
        }

        .page-info {
            color: var(--muted-strong);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .external-overlay {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: grid;
            grid-template-rows: auto 1fr;
            background: rgba(3, 7, 12, 0.96);
        }

        .external-overlay[hidden] {
            display: none !important;
        }

        .external-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px clamp(12px, 3vw, 22px);
            border-bottom: 1px solid var(--line);
            background: rgba(10, 17, 26, 0.98);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        }

        .external-title {
            min-width: 0;
            display: grid;
            gap: 3px;
        }

        .external-title strong {
            font-size: 0.96rem;
        }

        .external-title span {
            max-width: min(58vw, 860px);
            overflow: hidden;
            color: var(--muted);
            font-size: 0.76rem;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .external-actions {
            display: flex;
            flex: 0 0 auto;
            gap: 8px;
        }

        .external-actions a,
        .external-actions button {
            min-height: 38px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
            font: inherit;
            font-size: 0.82rem;
            font-weight: 800;
            text-decoration: none;
        }

        .external-actions a {
            display: inline-flex;
            align-items: center;
        }

        .external-actions .primary {
            color: #061016;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .external-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 12px 10px 34px;
            }

            .hero {
                position: relative;
                padding: 14px;
            }

            .hero-top {
                align-items: flex-start;
            }

            .brand-logo {
                width: 46px;
                height: 46px;
                border-radius: 14px;
            }

            .brand p {
                display: none;
            }

            .search-form,
            .search-form input,
            .search-form button,
            .filter-row select,
            .ghost-button {
                flex: 1 1 100%;
                width: 100%;
            }

            .pagination-row {
                width: 100%;
                border-radius: 18px;
            }

            .page-button {
                flex: 1 1 0;
            }

            .image-container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .anime-name-label {
                min-height: 68px;
                padding: 30px 10px 10px;
                font-size: 0.82rem;
            }

            .anime-meta {
                font-size: 0.66rem;
            }

            .external-bar {
                align-items: stretch;
                flex-direction: column;
            }

            .external-title span {
                max-width: 100%;
            }

            .external-actions a,
            .external-actions button {
                flex: 1 1 0;
                justify-content: center;
            }

            .anime-ep {
                min-width: 30px;
                height: 30px;
                padding: 0 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script defer src="/anime/auth/auth.js"></script>
</head>

<body>
    <div class="page-shell">
        <header class="hero">
            <div class="hero-top">
                <div class="brand">
                    <img class="brand-logo" src="/anime/image/r3_512.png" width="52" height="52" alt="R3 Anime">
                    <div>
                        <h1>Tân Liên Hoa Anime</h1>
                        <p>Lọc nhanh, tìm nhanh, mở player nhanh hơn.</p>
                    </div>
                </div>
                <div class="user-menu" id="user-menu" hidden>
                    <button class="user-avatar" id="user-avatar-btn" type="button" aria-haspopup="true" aria-expanded="false" title="Tài khoản">
                        <img id="user-avatar" alt="Ảnh đại diện">
                    </button>
                    <div class="avatar-dropdown" id="avatarDropdown">
                        <button id="signOutBtnDropdown" type="button">Đăng xuất</button>
                    </div>
                </div>
            </div>

            <form class="toolbar" id="search-form" role="search">
                <div class="search-form">
                    <input type="search" id="search-input" autocomplete="off" placeholder="Tìm anime theo tên, ví dụ: Naruto, One Piece...">
                    <button class="primary-button" type="submit">Tìm</button>
                </div>
                <button class="ghost-button" id="clearSearchBtn" type="button" hidden>Xóa tìm kiếm</button>
            </form>

            <div class="filter-row" id="filter-container" hidden>
                <select id="categoryFilter" aria-label="Lọc theo danh mục"></select>
                <select id="yearFilter" aria-label="Lọc theo năm"></select>
                <select id="seasonFilter" aria-label="Lọc theo mùa" hidden></select>
                <button class="ghost-button" id="refreshBtn" type="button">Làm mới dữ liệu</button>
            </div>

            <div class="stats-row">
                <span class="source-pill" id="source-pill">Đang tải</span>
                <span id="result-count">0 phim</span>
            </div>
        </header>

        <main class="main-area">
            <div class="status-panel" id="status-panel">
                <div class="loader" aria-hidden="true"></div>
                <p class="empty-title">Đang tải thư viện anime</p>
                <p>Vui lòng chờ trong giây lát.</p>
            </div>
            <div class="image-container" id="imageContainer" hidden></div>
            <div class="pagination-row" id="paginationContainer" hidden>
                <button class="page-button" id="prevSearchPageBtn" type="button">Trang trước</button>
                <span class="page-info" id="searchPageInfo">Trang 1/1</span>
                <button class="page-button" id="nextSearchPageBtn" type="button">Trang sau</button>
            </div>
        </main>
    </div>

    <div class="external-overlay" id="externalOverlay" hidden>
        <div class="external-bar">
            <div class="external-title">
                <strong>Nguồn ngoài</strong>
                <span id="externalSourceUrl">Đang tải...</span>
            </div>
            <div class="external-actions">
                <button id="closeExternalOverlay" type="button">Đóng</button>
                <a id="openExternalSource" class="primary" href="#" target="_blank" rel="noopener noreferrer">Mở nguồn gốc</a>
            </div>
        </div>
        <iframe
            class="external-frame"
            id="externalFrame"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const SHEET_ID = '12q04f4hwtVQjfVSUayDsgXLGGbqrl9urm8gp556nPQA';
            const SHEET_GID = '1193967919';
            const CACHE_TTL_MS = 15 * 60 * 1000;
            const CARD_EPISODE_PAGE_SIZE = 18;
            const ANIME_SEARCH_PAGE_SIZE = 10;
            const authUrl = '/anime/auth/';
            const imageContainer = document.getElementById('imageContainer');
            const statusPanel = document.getElementById('status-panel');
            const sourcePill = document.getElementById('source-pill');
            const resultCount = document.getElementById('result-count');
            const paginationContainer = document.getElementById('paginationContainer');
            const prevSearchPageBtn = document.getElementById('prevSearchPageBtn');
            const nextSearchPageBtn = document.getElementById('nextSearchPageBtn');
            const searchPageInfo = document.getElementById('searchPageInfo');
            const avatarBtn = document.getElementById('user-avatar-btn');
            const userMenu = document.getElementById('user-menu');
            const filterContainer = document.getElementById('filter-container');
            const userAvatar = document.getElementById('user-avatar');
            const avatarDropdown = document.getElementById('avatarDropdown');
            const selectedCategory = document.getElementById('categoryFilter');
            const selectedYear = document.getElementById('yearFilter');
            const selectedSeason = document.getElementById('seasonFilter');
            const searchForm = document.getElementById('search-form');
            const searchInput = document.getElementById('search-input');
            const clearSearchBtn = document.getElementById('clearSearchBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const externalOverlay = document.getElementById('externalOverlay');
            const externalFrame = document.getElementById('externalFrame');
            const externalSourceUrl = document.getElementById('externalSourceUrl');
            const openExternalSource = document.getElementById('openExternalSource');
            const closeExternalOverlay = document.getElementById('closeExternalOverlay');

            const state = {
                images: [],
                mode: 'catalog',
                loading: false,
                pagination: null,
                query: '',
            };

            function getUrlParameter(name) {
                return new URLSearchParams(window.location.search).get(name) || '';
            }

            function normalizeText(value) {
                return String(value || '')
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase()
                    .trim();
            }

            function normalizeAnimeSearchQuery(value = '') {
                return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 80);
            }

            function normalizeAnimeSearchPage(value = 1) {
                const parsed = Math.floor(Number(value || 1) || 1);
                return Math.max(1, parsed);
            }

            function normalizeAnimeSearchPageSize(value = ANIME_SEARCH_PAGE_SIZE) {
                const parsed = Math.floor(Number(value || ANIME_SEARCH_PAGE_SIZE) || ANIME_SEARCH_PAGE_SIZE);
                return Math.max(1, Math.min(ANIME_SEARCH_PAGE_SIZE, parsed));
            }

            function normalizeAnimePagination(rawPagination = {}, requestedPage = 1, requestedLimit = ANIME_SEARCH_PAGE_SIZE, itemCount = 0) {
                const pageSize = normalizeAnimeSearchPageSize(rawPagination?.totalItemsPerPage || requestedLimit);
                const totalItems = Math.max(0, Math.floor(Number(rawPagination?.totalItems || itemCount || 0) || 0));
                const derivedTotalPages = Math.ceil(Math.max(totalItems, Number(itemCount || 0) || 0) / pageSize);
                const totalPages = Math.max(1, Math.floor(Number(rawPagination?.totalPages || derivedTotalPages || 1) || 1));
                const currentPage = Math.max(1, Math.min(totalPages, Math.floor(Number(rawPagination?.currentPage || requestedPage || 1) || 1)));
                return {
                    totalItems: totalItems || Math.max(0, Number(itemCount || 0) || 0),
                    pageSize,
                    currentPage,
                    totalPages,
                    hasPrev: currentPage > 1,
                    hasNext: currentPage < totalPages,
                    offset: (currentPage - 1) * pageSize,
                };
            }

            function buildAnimeSearchApiUrl(query, page = 1, limit = ANIME_SEARCH_PAGE_SIZE) {
                const url = new URL('https://phimapi.com/v1/api/tim-kiem');
                url.searchParams.set('keyword', normalizeAnimeSearchQuery(query));
                url.searchParams.set('page', String(normalizeAnimeSearchPage(page)));
                url.searchParams.set('limit', String(normalizeAnimeSearchPageSize(limit)));
                url.searchParams.set('sort_field', 'year');
                url.searchParams.set('sort_order', 'desc');
                return url.toString();
            }

            function buildAnimeImageUrl(baseUrl = '', source = '') {
                const normalizedSource = String(source || '').trim();
                if (!normalizedSource) return '';
                if (/^https?:\/\//i.test(normalizedSource)) return normalizedSource;
                const normalizedBase = String(baseUrl || 'https://phimimg.com').trim().replace(/\/+$/, '');
                return normalizedBase ? `${normalizedBase}/${normalizedSource.replace(/^\/+/, '')}` : normalizedSource;
            }

            function buildAnimeResultTitle(item) {
                const name = String(item?.name || '').trim();
                const originName = String(item?.originName || item?.origin_name || '').trim();
                if (!name) return originName || 'Anime';
                if (!originName || normalizeText(originName) === normalizeText(name)) return name;
                return `${name} / ${originName}`;
            }

            function buildAnimeResultMeta(item) {
                const parts = [];
                const year = Number(item?.year || 0);
                if (year > 0) parts.push(String(year));
                if (item?.episode_current) parts.push(String(item.episode_current).trim());
                if (item?.quality) parts.push(String(item.quality).trim());
                if (item?.lang) parts.push(String(item.lang).trim());
                return parts.filter(Boolean).join(' • ');
            }

            function readCache(key) {
                try {
                    const record = JSON.parse(sessionStorage.getItem(key) || 'null');
                    if (!record || Date.now() - Number(record.savedAt || 0) > CACHE_TTL_MS) return null;
                    return record.value;
                } catch {
                    return null;
                }
            }

            function writeCache(key, value) {
                try {
                    sessionStorage.setItem(key, JSON.stringify({ savedAt: Date.now(), value }));
                } catch {
                    // Cache is an optimization only.
                }
            }

            function setStatus(type, title, detail = '') {
                statusPanel.hidden = false;
                imageContainer.hidden = true;
                paginationContainer.hidden = true;
                statusPanel.innerHTML = type === 'loading'
                    ? '<div class="loader" aria-hidden="true"></div>'
                    : '';
                const titleNode = document.createElement('p');
                titleNode.className = type === 'error' ? 'empty-title error-text' : 'empty-title';
                titleNode.textContent = title;
                statusPanel.appendChild(titleNode);
                if (detail) {
                    const detailNode = document.createElement('p');
                    detailNode.textContent = detail;
                    statusPanel.appendChild(detailNode);
                }
            }

            function showGrid() {
                statusPanel.hidden = true;
                imageContainer.hidden = false;
            }

            function renderSearchPagination() {
                const pagination = state.mode === 'search' ? state.pagination : null;
                if (!pagination || pagination.totalPages <= 1) {
                    paginationContainer.hidden = true;
                    return;
                }
                paginationContainer.hidden = false;
                prevSearchPageBtn.disabled = !pagination.hasPrev;
                nextSearchPageBtn.disabled = !pagination.hasNext;
                searchPageInfo.textContent = `Trang ${pagination.currentPage}/${pagination.totalPages}`;
            }

            async function fetchText(url, timeoutMs = 15000) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { signal: controller.signal });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.text();
                } finally {
                    clearTimeout(timer);
                }
            }

            async function fetchJson(url, timeoutMs = 15000) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { signal: controller.signal, headers: { Accept: 'application/json' } });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } finally {
                    clearTimeout(timer);
                }
            }

            async function fetchImageData(forceRefresh = false) {
                const cacheKey = `anime-sheet:${SHEET_ID}:${SHEET_GID}`;
                if (!forceRefresh) {
                    const cached = readCache(cacheKey);
                    if (cached) return cached;
                }

                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${SHEET_GID}`;
                const text = await fetchText(url);
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?/);
                const jsonString = match ? match[1] : text.match(/(?<="table":).*(?=}\);)/s)?.[0];
                const data = match ? JSON.parse(jsonString) : { table: JSON.parse(jsonString) };
                const cols = (data.table?.cols || []).map((col) => String(col.label || '').trim());
                const rows = (data.table?.rows || []).map((row) => {
                    const image = {};
                    (row.c || []).forEach((cell, index) => {
                        image[cols[index] || `col_${index}`] = cell ? String(cell.f || cell.v || '').trim() : '';
                    });
                    return image;
                });
                writeCache(cacheKey, rows);
                return rows;
            }

            function resetSelect(select, placeholder) {
                select.innerHTML = '';
                const option = document.createElement('option');
                option.value = '';
                option.textContent = placeholder;
                select.appendChild(option);
            }

            function populateFilters(defaultYear = null, defaultCategory = 'TV Show', defaultSeason = '') {
                const currentCategory = selectedCategory.value || defaultCategory;
                const currentYear = selectedYear.value || defaultYear;
                const currentSeason = selectedSeason.value || defaultSeason;
                const categories = [...new Set(state.images.map((image) => image.category).filter(Boolean))].sort();
                const years = [...new Set(state.images.map((image) => image.year).filter(Boolean))].sort().reverse();
                const seasons = [...new Set(state.images.map((image) => image.season).filter(Boolean))].sort();
                const currentCalendarYear = new Date().getFullYear();

                resetSelect(selectedCategory, 'Tất cả thể loại');
                resetSelect(selectedYear, 'Tất cả năm');
                resetSelect(selectedSeason, 'Tất cả mùa');

                categories.forEach((category) => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    option.selected = category === currentCategory;
                    selectedCategory.appendChild(option);
                });

                years.forEach((year, index) => {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year;
                    if (currentYear) {
                        option.selected = year === currentYear;
                    } else if (index === 0 && parseInt(year, 10) <= currentCalendarYear) {
                        option.selected = true;
                    }
                    selectedYear.appendChild(option);
                });

                seasons.forEach((season) => {
                    const option = document.createElement('option');
                    option.value = season;
                    option.textContent = season;
                    option.selected = season === currentSeason;
                    selectedSeason.appendChild(option);
                });

                selectedSeason.hidden = seasons.length < 2;
            }

            function getAnimeUrl(url) {
                const raw = String(url || '').trim();
                if (!raw) return '#';
                if (/\.(m3u8|mp4|json)(\?|#|$)/i.test(raw)) return `/anime/player/#${raw}`;
                if (raw.includes('facebook')) return `/anime/fb/?v=${encodeURIComponent(raw.split('=').pop() || raw)}`;
                if (raw.includes('youtube') && raw.includes('?')) return `/anime/yt/?${raw.split('?')[1]}`;
                if (!/^https?:\/\//i.test(raw)) return raw;
                return `/anime/frame/?u=${encodeURIComponent(raw)}`;
            }

            function isExternalPageUrl(url) {
                const raw = String(url || '').trim();
                return /^https?:\/\//i.test(raw) && !/\.(m3u8|mp4|json)(\?|#|$)/i.test(raw);
            }

            function markExternalTrigger(element, url) {
                element.dataset.externalUrl = url;
                element.classList.add('external-source');
                element.title = 'Nguồn ngoài - mở ngay trên trang Tân Liên Hoa';
            }

            function openExternalOverlay(url) {
                const raw = String(url || '').trim();
                if (!/^https?:\/\//i.test(raw)) return;
                externalSourceUrl.textContent = raw;
                openExternalSource.href = raw;
                externalFrame.src = raw;
                externalOverlay.hidden = false;
                document.body.classList.add('overlay-open');
                closeExternalOverlay.focus();
            }

            function closeOverlay() {
                externalOverlay.hidden = true;
                externalFrame.src = 'about:blank';
                document.body.classList.remove('overlay-open');
            }

            function parseEpisodes(value) {
                return String(value || '')
                    .split('\n')
                    .map((item) => item.trim())
                    .filter(Boolean)
                    .map((item) => {
                        const parts = item.split(':');
                        return [parts.shift().trim(), parts.join(':').trim()];
                    })
                    .filter(([episode]) => episode);
            }

            function renderEpisodesPage(epBox, episodes, page, history) {
                epBox.innerHTML = '';
                const totalPages = Math.max(1, Math.ceil(episodes.length / CARD_EPISODE_PAGE_SIZE));
                const safePage = Math.max(0, Math.min(totalPages - 1, page));
                const start = safePage * CARD_EPISODE_PAGE_SIZE;
                const pageEpisodes = episodes.slice(start, start + CARD_EPISODE_PAGE_SIZE);

                if (safePage > 0) {
                    epBox.appendChild(createEpisodePagerButton('‹', () => renderEpisodesPage(epBox, episodes, safePage - 1, history)));
                }

                pageEpisodes.forEach(([idx, url]) => {
                    const link = document.createElement('a');
                    link.className = 'anime-ep';
                    if (url) {
                        link.href = getAnimeUrl(url);
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        if (isExternalPageUrl(url)) {
                            markExternalTrigger(link, url);
                        }
                    } else {
                        link.classList.add('disabled');
                        link.setAttribute('aria-disabled', 'true');
                    }
                    const epText = document.createElement('span');
                    epText.className = `anime-ep-text${url && history[url] ? ' watched' : ''}`;
                    epText.textContent = idx;
                    link.appendChild(epText);
                    epBox.appendChild(link);
                });

                if (safePage < totalPages - 1) {
                    epBox.appendChild(createEpisodePagerButton('›', () => renderEpisodesPage(epBox, episodes, safePage + 1, history)));
                }
            }

            function createEpisodePagerButton(label, onClick) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'anime-ep';
                button.textContent = label;
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    onClick();
                });
                return button;
            }

            function getFirstEpisodeUrl(image) {
                const episodes = parseEpisodes(image.episodes);
                const firstEpisode = episodes.find(([, url]) => url);
                if (firstEpisode) return firstEpisode[1];
                return String(image.url || '').trim();
            }

            function buildCardUrl(image) {
                if (image.phimapi) return `/anime/artplayer/?k=${encodeURIComponent(image.phimapi)}`;
                if (image.playlist) return `/anime/artplayer/?id=${encodeURIComponent(image.playlist)}`;
                return getFirstEpisodeUrl(image);
            }

            function createAnimeCard(image, history, index) {
                const animeCard = document.createElement('article');
                animeCard.className = 'anime-card';

                const cardUrl = buildCardUrl(image);
                const link = document.createElement(cardUrl ? 'a' : 'div');
                link.className = 'poster-link';
                if (cardUrl) {
                    link.href = getAnimeUrl(cardUrl);
                    if (isExternalPageUrl(cardUrl)) {
                        markExternalTrigger(link, cardUrl);
                    }
                } else {
                    link.classList.add('no-card-link');
                    link.title = 'Phim này chưa có liên kết xem.';
                }

                const posterFrame = document.createElement('div');
                posterFrame.className = 'poster-frame';

                const img = document.createElement('img');
                img.src = image.image || '/anime/image/lazy.png';
                img.alt = image.name || 'Anime poster';
                img.width = 300;
                img.height = 424;
                img.decoding = 'async';
                img.loading = index < 8 ? 'eager' : 'lazy';
                if (index === 0) img.fetchPriority = 'high';
                img.className = 'img-thumbnail';
                img.onerror = () => {
                    img.onerror = null;
                    img.src = '/anime/image/lazy.png';
                };

                const nameLabel = document.createElement('div');
                nameLabel.className = 'anime-name-label';
                nameLabel.textContent = image.name || 'Anime';

                posterFrame.appendChild(img);
                posterFrame.appendChild(nameLabel);
                link.appendChild(posterFrame);

                const epBox = document.createElement('div');
                epBox.className = 'anime-ep-box';
                if (image.episodes) {
                    const episodes = parseEpisodes(image.episodes);
                    if (episodes.length) renderEpisodesPage(epBox, episodes, 0, history);
                } else if (image.ep) {
                    const badge = document.createElement(cardUrl ? 'a' : 'span');
                    badge.className = 'anime-ep';
                    if (cardUrl) {
                        badge.href = getAnimeUrl(cardUrl);
                        badge.target = '_blank';
                        badge.rel = 'noopener noreferrer';
                        if (isExternalPageUrl(cardUrl)) {
                            markExternalTrigger(badge, cardUrl);
                        }
                    } else {
                        badge.classList.add('disabled');
                    }
                    const badgeText = document.createElement('span');
                    badgeText.className = 'anime-ep-text';
                    badgeText.textContent = image.ep;
                    badge.appendChild(badgeText);
                    epBox.appendChild(badge);
                }

                const meta = document.createElement('div');
                meta.className = 'anime-meta';
                const left = document.createElement('span');
                left.textContent = image.category || 'Anime';
                const right = document.createElement('span');
                right.textContent = image.meta || [image.year, image.season].filter(Boolean).join(' • ') || image.status || '';
                meta.append(left, right);

                animeCard.append(epBox, link, meta);
                return animeCard;
            }

            function displayImages() {
                imageContainer.innerHTML = '';
                const history = JSON.parse(localStorage.getItem('history') || '{}');
                const localQuery = state.mode === 'catalog' ? normalizeText(searchInput.value) : '';
                let filteredImages = state.images.filter((image) => {
                    const matchesFilters = state.mode === 'search' || (
                        (!selectedCategory.value || image.category === selectedCategory.value) &&
                        (!selectedYear.value || image.year === selectedYear.value) &&
                        (!selectedSeason.value || image.season === selectedSeason.value)
                    );
                    const matchesLocalSearch = !localQuery || normalizeText(`${image.name} ${image.category} ${image.year}`).includes(localQuery);
                    return matchesFilters && matchesLocalSearch;
                });

                if (state.mode === 'catalog') {
                    filteredImages = filteredImages.sort((a, b) => String(b.status || '').localeCompare(String(a.status || '')));
                    resultCount.textContent = `${filteredImages.length.toLocaleString('vi-VN')} phim`;
                } else {
                    const pagination = state.pagination || normalizeAnimePagination({}, 1, ANIME_SEARCH_PAGE_SIZE, filteredImages.length);
                    const totalItems = Math.max(0, Number(pagination.totalItems || filteredImages.length || 0) || 0);
                    resultCount.textContent = `Trang ${pagination.currentPage}/${pagination.totalPages} • ${totalItems.toLocaleString('vi-VN')} kết quả`;
                }

                if (!filteredImages.length) {
                    setStatus('empty', 'Không có anime phù hợp', 'Thử đổi bộ lọc hoặc tìm bằng từ khóa khác.');
                    return;
                }

                const fragment = document.createDocumentFragment();
                filteredImages.forEach((image, index) => {
                    fragment.appendChild(createAnimeCard(image, history, index));
                });
                imageContainer.appendChild(fragment);
                showGrid();
                renderSearchPagination();
            }

            async function searchAnime(query, page = 1) {
                const normalizedQuery = normalizeAnimeSearchQuery(query);
                const safePage = normalizeAnimeSearchPage(page);
                const safeLimit = normalizeAnimeSearchPageSize(ANIME_SEARCH_PAGE_SIZE);
                if (normalizedQuery.length < 2) {
                    return {
                        items: [],
                        pagination: normalizeAnimePagination({}, safePage, safeLimit, 0),
                    };
                }
                const cacheKey = `anime-search:${normalizedQuery.toLowerCase()}:${safePage}`;
                const cached = readCache(cacheKey);
                if (cached) return cached;

                const payload = await fetchJson(buildAnimeSearchApiUrl(normalizedQuery, safePage, safeLimit));
                const data = payload?.data || {};
                const cdn = String(data?.APP_DOMAIN_CDN_IMAGE || 'https://phimimg.com').trim();
                const rawItems = Array.isArray(data?.items) ? data.items : [];
                const pagination = normalizeAnimePagination(data?.params?.pagination || {}, safePage, safeLimit, rawItems.length);
                const mapped = rawItems.map((item) => {
                    const slug = String(item?.slug || '').trim();
                    const title = buildAnimeResultTitle(item);
                    return {
                        id: item?._id || slug,
                        name: title,
                        image: buildAnimeImageUrl(cdn, item?.poster_url || item?.thumb_url),
                        category: String(item?.type || 'phimapi').trim().toLowerCase(),
                        year: String(item?.year || ''),
                        phimapi: slug,
                        status: String(item?.episode_current || '').trim(),
                        meta: buildAnimeResultMeta(item),
                        episodeCurrent: String(item?.episode_current || '').trim(),
                        quality: String(item?.quality || '').trim(),
                        lang: String(item?.lang || '').trim(),
                    };
                }).filter((item) => item.phimapi);
                const deduped = [];
                const seen = new Set();
                for (const item of mapped) {
                    if (seen.has(item.phimapi)) continue;
                    seen.add(item.phimapi);
                    deduped.push(item);
                    if (deduped.length >= ANIME_SEARCH_PAGE_SIZE) break;
                }
                const result = { items: deduped, pagination };
                writeCache(cacheKey, result);
                return result;
            }

            async function initData(options = {}) {
                if (state.loading) return;
                state.loading = true;
                setStatus('loading', 'Đang tải thư viện anime', 'Vui lòng chờ trong giây lát.');
                try {
                    const query = normalizeAnimeSearchQuery(getUrlParameter('q'));
                    const page = normalizeAnimeSearchPage(getUrlParameter('page') || 1);
                    clearSearchBtn.hidden = !query;
                    if (query) {
                        state.mode = 'search';
                        state.query = query;
                        searchInput.value = query;
                        filterContainer.hidden = true;
                        const result = await searchAnime(query, page);
                        state.images = result.items;
                        state.pagination = result.pagination;
                        sourcePill.textContent = `Tìm kiếm PhimAPI: ${query}`;
                    } else {
                        state.mode = 'catalog';
                        state.query = '';
                        state.pagination = null;
                        filterContainer.hidden = false;
                        sourcePill.textContent = 'Thư viện chọn lọc';
                        state.images = await fetchImageData(Boolean(options.forceRefresh));
                        populateFilters();
                    }
                    displayImages();
                } catch (error) {
                    console.error(error);
                    resultCount.textContent = '0 phim';
                    setStatus('error', 'Không tải được dữ liệu anime', 'Nguồn dữ liệu đang bận hoặc kết nối bị chặn. Hãy thử lại sau ít phút.');
                } finally {
                    state.loading = false;
                }
            }

            function updateQueryParam(query) {
                const url = new URL(window.location.href);
                if (query) {
                    url.searchParams.set('q', normalizeAnimeSearchQuery(query));
                } else {
                    url.searchParams.delete('q');
                }
                url.searchParams.delete('page');
                window.history.replaceState({}, '', url);
            }

            function updateSearchPage(page) {
                const query = normalizeAnimeSearchQuery(searchInput.value || state.query);
                if (!query) return;
                const url = new URL(window.location.href);
                url.searchParams.set('q', query);
                url.searchParams.set('page', String(normalizeAnimeSearchPage(page)));
                window.history.replaceState({}, '', url);
            }

            selectedCategory.addEventListener('change', displayImages);
            selectedYear.addEventListener('change', displayImages);
            selectedSeason.addEventListener('change', displayImages);
            searchInput.addEventListener('input', () => {
                if (state.mode === 'catalog') displayImages();
            });
            searchForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const query = searchInput.value.trim();
                updateQueryParam(query);
                await initData();
            });
            clearSearchBtn.addEventListener('click', async () => {
                searchInput.value = '';
                updateQueryParam('');
                await initData();
            });
            refreshBtn.addEventListener('click', async () => {
                await initData({ forceRefresh: true });
            });
            prevSearchPageBtn.addEventListener('click', async () => {
                const currentPage = normalizeAnimeSearchPage(state.pagination?.currentPage || 1);
                if (currentPage <= 1) return;
                updateSearchPage(currentPage - 1);
                await initData();
            });
            nextSearchPageBtn.addEventListener('click', async () => {
                const currentPage = normalizeAnimeSearchPage(state.pagination?.currentPage || 1);
                const totalPages = Math.max(1, Number(state.pagination?.totalPages || 1) || 1);
                if (currentPage >= totalPages) return;
                updateSearchPage(currentPage + 1);
                await initData();
            });
            closeExternalOverlay.addEventListener('click', closeOverlay);
            externalOverlay.addEventListener('click', (event) => {
                if (event.target === externalOverlay) closeOverlay();
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && !externalOverlay.hidden) closeOverlay();
            });
            document.addEventListener('click', (event) => {
                const externalTrigger = event.target.closest('[data-external-url]');
                if (externalTrigger) {
                    event.preventDefault();
                    openExternalOverlay(externalTrigger.dataset.externalUrl);
                    return;
                }
                if (avatarBtn.contains(event.target)) {
                    const shown = avatarDropdown.classList.toggle('show');
                    avatarBtn.setAttribute('aria-expanded', String(shown));
                } else if (!avatarDropdown.contains(event.target)) {
                    avatarDropdown.classList.remove('show');
                    avatarBtn.setAttribute('aria-expanded', 'false');
                }
            });
            document.getElementById('signOutBtnDropdown').addEventListener('click', () => {
                if (window.firebase?.auth) {
                    firebase.auth().signOut().then(() => {
                        window.location.href = authUrl;
                    });
                }
            });

            function bootWhenFirebaseReady() {
                if (!window.firebase?.auth) {
                    window.setTimeout(bootWhenFirebaseReady, 50);
                    return;
                }
                firebase.auth().onAuthStateChanged(async (user) => {
                    if (!user) {
                        window.location.href = authUrl;
                        return;
                    }
                    if (user.photoURL && window.location.hostname !== 'localhost') {
                        userAvatar.src = user.photoURL;
                    } else {
                        userAvatar.src = '/anime/image/r3_128.png';
                    }
                    userMenu.hidden = false;
                    await initData();
                });
            }

            bootWhenFirebaseReady();
        });
    </script>
